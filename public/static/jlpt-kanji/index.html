<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JLPT N5·N4 한자 인터랙티브 학습</title>
<style>
  :root{
    --bg:#0f1115; --panel:#181b22; --panel2:#1f232c; --line:#2a2f3a;
    --txt:#e7ebf2; --sub:#9aa3b2; --accent:#6ea8fe; --accent2:#22c55e;
    --n5:#6ea8fe; --n4:#f0883e; --warn:#fbbf24; --bad:#ef4444;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Hiragino Sans",sans-serif;
    line-height:1.5; padding:16px; max-width:1100px; margin:0 auto;
  }
  h1{font-size:1.35rem; margin:.2rem 0 .1rem}
  .sub{color:var(--sub); font-size:.82rem; margin-bottom:14px}
  .sub b{color:var(--warn)}

  .bar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px}
  .seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden}
  .seg button{
    background:transparent; color:var(--sub); border:0; padding:8px 16px;
    font-size:.9rem; font-weight:600; cursor:pointer; transition:.15s;
  }
  .seg button.on{color:#fff}
  .seg.level button.on[data-level="N5"]{background:var(--n5)}
  .seg.level button.on[data-level="N4"]{background:var(--n4)}
  .seg.mode button.on{background:var(--panel2); color:#fff}

  .spacer{flex:1}
  .search{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:8px 12px; color:var(--txt); font-size:.88rem; min-width:160px;
  }
  .search::placeholder{color:var(--sub)}

  .stat{font-size:.8rem; color:var(--sub); display:flex; gap:14px; align-items:center; margin-bottom:12px; flex-wrap:wrap}
  .stat b{color:var(--accent2)}
  .progwrap{flex:1; min-width:140px; height:8px; background:var(--panel2); border-radius:99px; overflow:hidden}
  .progbar{height:100%; width:0; background:linear-gradient(90deg,var(--accent2),#86efac); transition:width .3s}
  .reset{background:none;border:1px solid var(--line);color:var(--sub);border-radius:8px;padding:4px 10px;font-size:.75rem;cursor:pointer}

  /* ===== 그리드 학습 ===== */
  #grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px}
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:12px; cursor:pointer; position:relative; transition:.15s; overflow:hidden;
  }
  .card:hover{border-color:var(--accent); transform:translateY(-2px)}
  .card.known{border-color:var(--accent2); background:linear-gradient(180deg,rgba(34,197,94,.08),var(--panel))}
  .card .kanji{font-size:2.4rem; font-weight:700; line-height:1.1; font-family:"Hiragino Mincho ProN","Yu Mincho",serif}
  .card .read{font-size:.78rem; color:var(--sub); margin-top:6px}
  .card .read .on{color:var(--accent)}
  .card .read .kun{color:#f9a8d4}
  .card .mean{font-size:.92rem; font-weight:600; margin-top:4px}
  .card .ex{font-size:.74rem; color:var(--sub); margin-top:6px; border-top:1px dashed var(--line); padding-top:5px}
  .card .chk{position:absolute; top:8px; right:10px; font-size:.9rem; opacity:.25}
  .card.known .chk{opacity:1; color:var(--accent2)}
  .badge{position:absolute; top:8px; left:10px; font-size:.6rem; font-weight:700; padding:1px 6px; border-radius:99px; color:#fff}
  .badge.N5{background:var(--n5)} .badge.N4{background:var(--n4)}

  /* ===== 플래시카드 ===== */
  #flash{display:none; flex-direction:column; align-items:center; gap:16px; padding:10px}
  .fc{
    width:min(420px,92vw); height:300px; perspective:1200px; cursor:pointer;
  }
  .fc-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d}
  .fc.flip .fc-inner{transform:rotateY(180deg)}
  .fc-face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:18px;
    background:var(--panel); border:1px solid var(--line); box-shadow:var(--shadow);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:20px; text-align:center;
  }
  .fc-front .bk{font-size:6rem; font-weight:700; font-family:"Hiragino Mincho ProN","Yu Mincho",serif}
  .fc-front .hint{color:var(--sub); font-size:.8rem}
  .fc-back{transform:rotateY(180deg)}
  .fc-back .mean{font-size:1.8rem; font-weight:700}
  .fc-back .read{color:var(--sub); font-size:1rem}
  .fc-back .read .on{color:var(--accent)} .fc-back .read .kun{color:#f9a8d4}
  .fc-back .ex{color:var(--sub); font-size:.9rem; margin-top:6px}
  .fc-ctrl{display:flex; gap:10px; align-items:center}
  .fc-ctrl button{
    background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    border-radius:10px; padding:10px 18px; font-size:.9rem; font-weight:600; cursor:pointer;
  }
  .fc-ctrl button.good{background:var(--accent2); border-color:var(--accent2); color:#062b13}
  .fc-ctrl .count{color:var(--sub); font-size:.85rem; min-width:70px; text-align:center}

  /* ===== 퀴즈 ===== */
  #quiz{display:none; flex-direction:column; align-items:center; gap:16px; padding:10px}
  .qz-q{font-size:5rem; font-weight:700; font-family:"Hiragino Mincho ProN","Yu Mincho",serif}
  .qz-prompt{color:var(--sub); font-size:.85rem; margin-top:-8px}
  .qz-opts{display:grid; grid-template-columns:1fr 1fr; gap:10px; width:min(460px,92vw)}
  .qz-opts button{
    background:var(--panel); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:14px; font-size:1rem; font-weight:600; cursor:pointer; transition:.12s;
  }
  .qz-opts button:hover{border-color:var(--accent)}
  .qz-opts button.correct{background:var(--accent2); border-color:var(--accent2); color:#062b13}
  .qz-opts button.wrong{background:var(--bad); border-color:var(--bad); color:#fff}
  .qz-score{color:var(--sub); font-size:.9rem}
  .qz-score b{color:var(--accent2)}
  .qz-next{background:var(--accent); border:0; color:#06214d; border-radius:10px; padding:10px 22px; font-weight:700; cursor:pointer; visibility:hidden}

  .empty{color:var(--sub); text-align:center; padding:40px; grid-column:1/-1}
  footer{margin-top:28px; color:var(--sub); font-size:.72rem; text-align:center; border-top:1px solid var(--line); padding-top:14px}
  @media(max-width:520px){
    .qz-q{font-size:4rem} .fc-front .bk{font-size:4.5rem}
    .stat{font-size:.72rem}
  }
</style>
</head>
<body>
  <h1>🗾 JLPT N5·N4 한자 인터랙티브 학습</h1>
  <div class="sub">학습 → 플래시카드 → 퀴즈로 익히세요. 외운 한자는 ✅로 표시되고 자동 저장됩니다. <b>※ 통용 리스트 기준 (JLPT 공식 한자표는 비공개)</b></div>

  <div class="bar">
    <div class="seg level" id="levelSeg">
      <button data-level="N5" class="on">N5</button>
      <button data-level="N4">N4</button>
    </div>
    <div class="seg mode" id="modeSeg">
      <button data-mode="grid" class="on">📖 학습</button>
      <button data-mode="flash">🃏 플래시</button>
      <button data-mode="quiz">❓ 퀴즈</button>
    </div>
    <div class="spacer"></div>
    <input class="search" id="search" placeholder="🔍 한자·뜻·읽기 검색" />
  </div>

  <div class="stat">
    <span>외운 한자 <b id="knownCount">0</b> / <span id="totalCount">0</span></span>
    <div class="progwrap"><div class="progbar" id="progbar"></div></div>
    <button class="reset" id="resetBtn">현재 레벨 진도 초기화</button>
  </div>

  <!-- 학습 그리드 -->
  <div id="grid"></div>

  <!-- 플래시카드 -->
  <div id="flash">
    <div class="fc" id="fcCard">
      <div class="fc-inner">
        <div class="fc-face fc-front">
          <div class="bk" id="fcKanji">日</div>
          <div class="hint">탭하면 뜻이 보여요</div>
        </div>
        <div class="fc-face fc-back">
          <div class="mean" id="fcMean"></div>
          <div class="read" id="fcRead"></div>
          <div class="ex" id="fcEx"></div>
        </div>
      </div>
    </div>
    <div class="fc-ctrl">
      <button id="fcShuffle">🔀 셔플</button>
      <span class="count" id="fcCount">1 / 1</span>
      <button class="good" id="fcKnown">✅ 외웠어요</button>
      <button id="fcNext">다음 ▶</button>
    </div>
  </div>

  <!-- 퀴즈 -->
  <div id="quiz">
    <div class="qz-q" id="qzKanji">?</div>
    <div class="qz-prompt">이 한자의 뜻은?</div>
    <div class="qz-opts" id="qzOpts"></div>
    <div class="qz-score">점수 <b id="qzScore">0</b> / <span id="qzTotal">0</span></div>
    <button class="qz-next" id="qzNext">다음 문제 ▶</button>
  </div>

  <footer>
    데이터: JLPT N5·N4 통용 한자 리스트(공식 비공개) · 진도는 브라우저(localStorage)에 저장됩니다 · 한자는 단어 단위로 익히는 것을 추천합니다.
  </footer>

/* ===================== 상태 ===================== */
let level = "N5";
let mode = "grid";
let query = "";
const STORE_KEY = "jlpt_kanji_known_v1";
let known = JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); // {kanji:true}

function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(known)); }
function curList(){
  let arr = DATA[level];
  if(query){
    const q = query.toLowerCase();
    arr = arr.filter(d => d.k.includes(q) || d.m.toLowerCase().includes(q)
      || d.on.toLowerCase().includes(q) || d.kun.toLowerCase().includes(q)
      || (d.ex && d.ex.includes(q)));
  }
  return arr;
}

/* ===================== 통계 ===================== */
function updateStat(){
  const total = DATA[level].length;
  const cnt = DATA[level].filter(d => known[d.k]).length;
  document.getElementById("knownCount").textContent = cnt;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("progbar").style.width = (total? (cnt/total*100):0) + "%";
}

/* ===================== 그리드 렌더 ===================== */
function renderGrid(){
  const grid = document.getElementById("grid");
  const arr = curList();
  if(!arr.length){ grid.innerHTML = '<div class="empty">검색 결과가 없어요 🔍</div>'; return; }
  grid.innerHTML = arr.map(d => `
    <div class="card ${known[d.k]?'known':''}" data-k="${d.k}">
      <span class="badge ${level}">${level}</span>
      <span class="chk">✔</span>
      <div class="kanji">${d.k}</div>
      <div class="read"><span class="on">音 ${d.on}</span><br><span class="kun">訓 ${d.kun}</span></div>
      <div class="mean">${d.m}</div>
      <div class="ex">📝 ${d.ex} <span style="opacity:.7">(${d.exr})</span></div>
    </div>`).join("");
  grid.querySelectorAll(".card").forEach(c=>{
    c.onclick = ()=>{
      const k = c.dataset.k;
      known[k] = !known[k];
      if(!known[k]) delete known[k];
      save(); c.classList.toggle("known", !!known[k]); updateStat();
    };
  });
}

/* ===================== 플래시카드 ===================== */
let fcArr = [], fcIdx = 0;
function initFlash(){
  fcArr = curList().slice();
  fcIdx = 0;
  renderFlash();
}
function renderFlash(){
  if(!fcArr.length){ document.getElementById("fcKanji").textContent="∅"; document.getElementById("fcCount").textContent="0 / 0"; return; }
  const d = fcArr[fcIdx];
  document.getElementById("fcCard").classList.remove("flip");
  document.getElementById("fcKanji").textContent = d.k;
  document.getElementById("fcMean").textContent = d.m;
  document.getElementById("fcRead").innerHTML = `<span class="on">音 ${d.on}</span> · <span class="kun">訓 ${d.kun}</span>`;
  document.getElementById("fcEx").innerHTML = `📝 ${d.ex} (${d.exr})`;
  document.getElementById("fcCount").textContent = `${fcIdx+1} / ${fcArr.length}`;
  document.getElementById("fcKnown").textContent = known[d.k] ? "✅ 외운 한자" : "✅ 외웠어요";
}
document.getElementById("fcCard").onclick = ()=> document.getElementById("fcCard").classList.toggle("flip");
document.getElementById("fcNext").onclick = ()=>{ if(!fcArr.length)return; fcIdx=(fcIdx+1)%fcArr.length; renderFlash(); };
document.getElementById("fcShuffle").onclick = ()=>{ fcArr.sort(()=>Math.random()-0.5); fcIdx=0; renderFlash(); };
document.getElementById("fcKnown").onclick = ()=>{
  if(!fcArr.length)return;
  const k = fcArr[fcIdx].k; known[k]=true; save(); updateStat();
  fcIdx=(fcIdx+1)%fcArr.length; renderFlash();
};

/* ===================== 퀴즈 ===================== */
let qzScore=0, qzTotal=0, qzCur=null;
function newQuiz(){
  const arr = DATA[level];
  if(arr.length<4) return;
  qzCur = arr[Math.floor(Math.random()*arr.length)];
  // 오답 3개
  const opts = [qzCur];
  while(opts.length<4){
    const c = arr[Math.floor(Math.random()*arr.length)];
    if(!opts.find(o=>o.k===c.k)) opts.push(c);
  }
  opts.sort(()=>Math.random()-0.5);
  document.getElementById("qzKanji").textContent = qzCur.k;
  const box = document.getElementById("qzOpts");
  box.innerHTML = opts.map(o=>`<button data-k="${o.k}">${o.m}</button>`).join("");
  box.querySelectorAll("button").forEach(b=>{
    b.onclick = ()=>{
      box.querySelectorAll("button").forEach(x=>x.disabled=true);
      qzTotal++;
      if(b.dataset.k===qzCur.k){ b.classList.add("correct"); qzScore++; known[qzCur.k]=true; save(); updateStat(); }
      else{
        b.classList.add("wrong");
        box.querySelector(`button[data-k="${qzCur.k}"]`).classList.add("correct");
      }
      document.getElementById("qzScore").textContent=qzScore;
      document.getElementById("qzTotal").textContent=qzTotal;
      document.getElementById("qzNext").style.visibility="visible";
    };
  });
  document.getElementById("qzNext").style.visibility="hidden";
}
document.getElementById("qzNext").onclick = newQuiz;

/* ===================== 모드/레벨 전환 ===================== */
function applyMode(){
  document.getElementById("grid").style.display  = mode==="grid"  ? "grid" : "none";
  document.getElementById("flash").style.display = mode==="flash" ? "flex" : "none";
  document.getElementById("quiz").style.display  = mode==="quiz"  ? "flex" : "none";
  if(mode==="grid") renderGrid();
  if(mode==="flash") initFlash();
  if(mode==="quiz"){ qzScore=0; qzTotal=0; document.getElementById("qzScore").textContent=0; document.getElementById("qzTotal").textContent=0; newQuiz(); }
}
document.getElementById("levelSeg").onclick = (e)=>{
  const b = e.target.closest("button"); if(!b)return;
  level = b.dataset.level;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle("on", x===b));
  updateStat(); applyMode();
};
document.getElementById("modeSeg").onclick = (e)=>{
  const b = e.target.closest("button"); if(!b)return;
  mode = b.dataset.mode;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle("on", x===b));
  applyMode();
};
document.getElementById("search").oninput = (e)=>{
  query = e.target.value.trim();
  if(mode==="grid") renderGrid();
  if(mode==="flash") initFlash();
};
document.getElementById("resetBtn").onclick = ()=>{
  if(!confirm(`${level} 레벨의 외운 표시를 모두 지울까요?`)) return;
  DATA[level].forEach(d=> delete known[d.k]);
  save(); updateStat(); applyMode();
};

/* ===================== 초기화 ===================== */
updateStat();
applyMode();
</script>
